<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>글쓰기 | 중개사 AI 클럽</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      "colors": {
        "secondary": "#8b5cf6",
        "border": "rgba(255, 255, 255, 0.08)",
        "muted": "#94a3b8",
        "grey-700": "#64748b",
        "on-surface": "#f8fafc",
        "success": "#10b981",
        "on-background": "#f8fafc",
        "secondary-container": "rgba(139, 92, 246, 0.15)",
        "on-secondary-container": "#c084fc",
        "surface-container-low": "#0f0f15",
        "on-secondary": "#ffffff",
        "surface-container-lowest": "#07070a",
        "primary": "#06b6d4",
        "primary-container": "rgba(6, 182, 212, 0.15)",
        "on-primary": "#ffffff",
        "error": "#ef4444",
        "outline-variant": "rgba(255, 255, 255, 0.1)",
        "surface-container-highest": "#1e1e2f",
        "surface-dim": "#0c0c12",
        "inverse-on-surface": "#07070a",
        "surface-container": "#141420",
        "canvas": "#07070a",
        "grey-600": "#94a3b8",
        "on-surface-variant": "#cbd5e1"
      },
      "borderRadius": { "DEFAULT": "0.25rem","lg": "0.5rem","xl": "0.75rem","full": "9999px" },
      "spacing": { "lg": "24px","base": "16px","xxl": "48px","xl": "32px" },
      "fontFamily": { "body-lg": ["Inter","sans-serif"],"display-lg": ["Plus Jakarta Sans","sans-serif"],"body-md": ["Inter","sans-serif"],"label-sm": ["Inter","sans-serif"],"heading-md": ["Plus Jakarta Sans","sans-serif"],"display-hero": ["Plus Jakarta Sans","sans-serif"] },
      "fontSize": { "body-lg": ["16px",{"lineHeight":"24px","fontWeight":"400"}],"display-lg": ["26px",{"lineHeight":"36px","fontWeight":"700"}],"body-md": ["14px",{"lineHeight":"22px","fontWeight":"400"}],"label-sm": ["12px",{"lineHeight":"16px","fontWeight":"500"}],"heading-md": ["20px",{"lineHeight":"28px","fontWeight":"600"}],"display-hero": ["30px",{"lineHeight":"40px","fontWeight":"700"}] }
    }
  }
}
</script>
<style>
body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; background-color: #07070a; }
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
.form-card { background-color: #141420; border: 1px solid rgba(255, 255, 255, 0.06); }
</style>
</head>
<body class="bg-canvas text-on-surface">

<header class="bg-canvas/80 backdrop-blur-md border-b border-border fixed top-0 w-full z-50">
  <nav class="flex justify-between items-center h-20 px-base md:px-xxl max-w-7xl mx-auto w-full">
    <a href="/" class="font-display-lg text-display-lg text-primary flex items-center gap-2">
      <span class="material-symbols-outlined text-[28px] text-cyan-400">sparkles</span>
      <span>중개사 AI 클럽</span>
    </a>
    <div class="hidden md:flex items-center gap-xl">
      <a class="text-grey-600 font-medium hover:text-primary transition-colors" href="/">홈페이지</a>
      <a class="text-primary font-bold border-b-2 border-primary pb-1" href="news.html">AI 뉴스 &amp; 팁</a>
      <a class="text-grey-600 font-medium hover:text-primary transition-colors" href="admin.html">관리자</a>
    </div>
  </nav>
</header>

<main class="pt-32 pb-xxl px-base md:px-xxl max-w-3xl mx-auto w-full min-h-screen">
  <div class="mb-lg">
    <a href="admin.html" class="inline-flex items-center gap-2 text-grey-600 hover:text-primary transition-colors font-body-md text-body-md min-h-[44px]">
      <span class="material-symbols-outlined">arrow_back</span>관리자 페이지로 돌아가기
    </a>
  </div>

  <h1 id="page-title" class="font-display-hero text-display-hero text-on-surface mb-xl font-bold">새 글 작성</h1>

  <form id="post-form" class="form-card rounded-2xl p-lg md:p-xl space-y-lg pb-xl">
    <div>
      <label class="block font-heading-md text-sm text-on-surface mb-2" for="category">카테고리</label>
      <select id="category" class="w-full bg-[#0f0f15] border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none min-h-[44px]">
        <option value="AI뉴스">AI뉴스</option>
        <option value="개발팁">개발팁</option>
      </select>
    </div>

    <div>
      <label class="block font-heading-md text-sm text-on-surface mb-2" for="title">제목</label>
      <input id="title" type="text" class="w-full bg-[#0f0f15] border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface placeholder:text-muted focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none min-h-[44px]" placeholder="게시글 제목을 입력하세요" required>
    </div>

    <div>
      <label class="block font-heading-md text-sm text-on-surface mb-2" for="date">날짜</label>
      <input id="date" type="date" class="w-full bg-[#0f0f15] border border-border rounded-xl px-base py-3 font-body-lg text-body-lg text-on-surface focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none min-h-[44px]">
    </div>

    <div>
      <label class="block font-heading-md text-sm text-on-surface mb-2" for="content">본문 <span class="text-muted font-label-sm text-xs font-normal">(마크다운 지원)</span></label>
      <textarea id="content" rows="14" class="w-full bg-[#0f0f15] border border-border rounded-xl px-base py-3 font-body-md text-body-md text-on-surface placeholder:text-muted focus:border-primary focus:ring-1 focus:ring-primary focus:outline-none resize-y" placeholder="내용을 마크다운으로 작성하세요.&#10;&#10;## 소제목&#10;- 리스트 항목&#10;**텍스트 굵게**, `인라인 코드`"></textarea>
    </div>

    <div id="error-msg" class="hidden text-error font-body-md text-body-md bg-red-950/20 border border-red-900/30 rounded-xl px-base py-3"></div>
    <div id="success-msg" class="hidden text-success font-body-md text-body-md bg-emerald-950/20 border border-emerald-900/30 rounded-xl px-base py-3"></div>

    <div class="flex flex-col sm:flex-row gap-base pt-4">
      <button type="submit" id="submit-btn" class="flex-1 bg-primary text-on-primary py-4 rounded-xl font-heading-md text-base font-bold hover:opacity-90 transition-all flex items-center justify-center gap-2 min-h-[44px]">
        <span class="material-symbols-outlined">save</span>저장하기
      </button>
      <a href="admin.html" class="flex-1 bg-surface-container border border-border text-grey-600 py-4 rounded-xl font-heading-md text-base font-bold hover:bg-opacity-80 transition-all flex items-center justify-center min-h-[44px]">취소</a>
    </div>
  </form>
</main>

<div class="fixed bottom-0 left-0 right-0 bg-canvas/90 backdrop-blur-md border-t border-border flex md:hidden justify-around items-center h-16 z-50">
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="/">
    <span class="material-symbols-outlined">home</span><span class="text-[10px]">홈</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-grey-600 min-w-[44px] min-h-[44px] justify-center" href="news.html">
    <span class="material-symbols-outlined">newspaper</span><span class="text-[10px]">소식</span>
  </a>
  <a class="flex flex-col items-center gap-1 text-primary font-bold min-w-[44px] min-h-[44px] justify-center" href="admin.html">
    <span class="material-symbols-outlined">person</span><span class="text-[10px]">관리</span>
  </a>
</div>

<script src="db.js"></script>
<script>
requireAdmin();

const params = new URLSearchParams(location.search);
const editId = params.get('id') ? Number(params.get('id')) : null;
let editPost = null;

const today = new Date().toISOString().slice(0, 10);
document.getElementById('date').value = today;

async function loadEditPost() {
  if (!editId) return;
  document.getElementById('page-title').textContent = '게시글 수정';
  const posts = await getPosts();
  editPost = posts.find(p => p.id === editId);
  if (!editPost) { showError('게시글을 찾을 수 없습니다.'); return; }
  document.getElementById('category').value = editPost.category || 'AI뉴스';
  document.getElementById('title').value = editPost.title || '';
  document.getElementById('date').value = editPost.date || today;
  document.getElementById('content').value = editPost.content || '';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.classList.remove('hidden');
  document.getElementById('success-msg').classList.add('hidden');
}

function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.classList.remove('hidden');
  document.getElementById('error-msg').classList.add('hidden');
}

document.getElementById('post-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const title = document.getElementById('title').value.trim();
  const content = document.getElementById('content').value.trim();
  if (!title) { showError('제목을 입력해주세요.'); return; }
  if (!content) { showError('본문을 입력해주세요.'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined">hourglass_empty</span>저장 중...';

  const post = {
    id: editId || null,
    category: document.getElementById('category').value,
    title,
    date: document.getElementById('date').value,
    content
  };

  try {
    await savePost(post);
    showSuccess('성공적으로 저장되었습니다! 관리자 페이지로 이동합니다...');
    setTimeout(() => location.href = 'admin.html', 1500);
  } catch(err) {
    showError('저장 실패: ' + err.message);
    btn.disabled = false;
    btn.innerHTML = '<span class="material-symbols-outlined">save</span>저장하기';
  }
});

loadEditPost();
</script>
</body>
</html>
